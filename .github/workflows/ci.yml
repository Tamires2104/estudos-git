name: Minha Pipeline CI

on: [push]

jobs:
  pipeline:

    runs-on: ubuntu-latest

    steps:

      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Executar script Python
        run: python hello.py
